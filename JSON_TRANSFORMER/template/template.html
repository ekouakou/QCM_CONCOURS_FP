  explanation:`<p>Docker Hub est la plateforme cloud officielle de Docker pour stocker, partager et distribuer des images de conteneurs. C'est le plus grand registre public d'images Docker au monde, hébergeant des millions d'images provenant de l'écosystème open source et de l'industrie.</p><p>Docker Hub offre plusieurs types de contenu et fonctionnalités. Les <strong>images officielles</strong> sont maintenues directement par Docker Inc. ou par les éditeurs logiciels en partenariat avec Docker (nginx, postgres, redis, node, python, ubuntu, alpine, etc.). Elles sont régulièrement mises à jour, auditées pour les vulnérabilités de sécurité, et constituent la source la plus fiable pour les images de base. Les <strong>images vérifiées</strong> (Verified Publishers) proviennent d'éditeurs de logiciels commerciaux ayant passé un processus de vérification Docker. Les <strong>dépôts communautaires</strong> sont des images publiées par n'importe quel utilisateur inscrit.</p><p>Côté accès, Docker Hub propose des <strong>dépôts publics</strong> (gratuits, téléchargeables par tous) et des <strong>dépôts privés</strong> (accessibles uniquement aux membres autorisés, inclus dans les plans payants). Pour interagir avec Docker Hub, on utilise <code>docker login</code> pour s'authentifier, <code>docker push mon-user/mon-image:tag</code> pour publier et <code>docker pull mon-user/mon-image:tag</code> pour télécharger. Par défaut et sans préfixe de registre, Docker cherche les images sur Docker Hub.</p><p>Dans un environnement professionnel, Docker Hub est généralement utilisé pour les images de base publiques, combiné à des registres privés internes (Amazon ECR, Google Artifact Registry, Azure Container Registry, Harbor) pour les images propriétaires de l'entreprise.</p>`,

  q:"Qu'est-ce qui est utilisé pour convertir un groupe d'hôtes Docker en un seul hôte Docker virtuel ?",

  correct:"C",
  explanation:`<p>Docker Swarm est le système d'orchestration natif intégré dans Docker Engine qui permet de regrouper plusieurs hôtes Docker (machines physiques ou virtuelles avec Docker installé) en un cluster géré comme une seule entité cohérente. C'est littéralement ce qu'il fait : convertir un groupe d'hôtes individuels en un unique "hôte Docker virtuel" depuis le point de vue de l'administrateur.</p><p>Pour bien comprendre l'architecture de Docker Swarm, imaginons que vous avez 5 serveurs distincts avec Docker installé sur chacun. Docker Swarm les organise en un "Swarm" (essaim) structuré autour de deux types de rôles. Les <strong>nœuds managers</strong> maintiennent l'état désiré du cluster, orchestrent le déploiement des services, gèrent le consensus distribué via l'algorithme Raft, et acceptent les commandes de l'API Docker Swarm. Les <strong>nœuds workers</strong> reçoivent et exécutent les tâches (conteneurs) assignées par les managers.</p><p>Les commandes essentielles : <code>docker swarm init --advertise-addr &lt;IP-manager&gt;</code> initialise le Swarm sur le premier nœud (qui devient manager), <code>docker swarm join --token &lt;token&gt; &lt;IP-manager&gt;:2377</code> ajoute un worker, et <code>docker service create --replicas 3 --name mon-service mon-image</code> déploie un service répliqué sur 3 conteneurs répartis automatiquement sur les nœuds disponibles.</p><p>Docker Swarm gère automatiquement la répartition de charge entre conteneurs, la tolérance aux pannes (si un nœud tombe, ses conteneurs sont redémarrés sur d'autres nœuds), les mises à jour progressives sans interruption de service (rolling updates), et la mise à l'échelle simple (<code>docker service scale mon-service=5</code>). Il est souvent comparé à Kubernetes : Swarm est plus simple mais moins puissant pour les très grandes échelles.</p>`,
  wrongAnalysis:[
    {l:"A",t:"Docker Images sont des artefacts statiques de stockage du système de fichiers applicatif. Elles n'ont aucune capacité d'orchestration, de clustering ou de gestion d'infrastructure. Elles sont nécessaires pour créer des conteneurs mais ne gèrent pas des hôtes."},
    {l:"B",t:"Docker Compose orchestre plusieurs conteneurs sur <em>un seul hôte</em> via un fichier YAML. C'est précisément sa limitation : il ne gère pas plusieurs hôtes Docker et ne crée pas de cluster. Pour passer à plusieurs hôtes, on utilise Docker Swarm ou Kubernetes."},
    {l:"D",t:"Docker Hub est un registre cloud de stockage et distribution d'images. Il ne gère pas des hôtes Docker, ne crée pas de clusters et n'a aucune capacité d'orchestration d'infrastructure."}
  ],

  summary:["Docker Swarm regroupe plusieurs hôtes Docker en un cluster géré comme un seul hôte virtuel.","Architecture : nœuds managers (orchestration, consensus Raft) et workers (exécution des conteneurs).","Il gère automatiquement la haute disponibilité, la répartition de charge et les rolling updates.","Docker Compose = 1 hôte multi-conteneurs ; Docker Swarm = cluster multi-hôtes ; K8s = orchestration avancée."]
},
{
  num:"Q3", partie:"Partie 5",
  q:"Quel est la template utilisé pour décrire le build d'une image ?",
  choices:{A:"Docker Logs",B:"Docker Documents",C:"DockerFile",D:"Docker Stream"},
  correct:"C",
  explanation:`<p>Le Dockerfile est le fichier template utilisé pour décrire toutes les étapes nécessaires à la construction (build) d'une image Docker. C'est le document de référence qui définit entièrement et de façon reproductible comment l'image doit être assemblée.</p><p>Pour bien comprendre ce concept fondamental, le Dockerfile est à Docker ce que le Makefile est à la compilation C : un fichier déclaratif qui décrit une série d'opérations à réaliser dans l'ordre pour produire un artefact. Chaque instruction du Dockerfile produit une nouvelle couche dans l'image finale, et Docker met en cache ces couches pour accélérer les builds suivants si les instructions n'ont pas changé.</p><p>Un Dockerfile minimal pour une application Python ressemble à ceci : <code>FROM python:3.11-slim</code> (image de base), <code>WORKDIR /app</code> (répertoire de travail), <code>COPY requirements.txt .</code> (copie du fichier de dépendances), <code>RUN pip install --no-cache-dir -r requirements.txt</code> (installation des dépendances), <code>COPY . .</code> (copie du code applicatif), et <code>CMD ["python", "app.py"]</code> (commande de démarrage). Ce fichier décrit complètement et sans ambiguïté comment construire l'image.</p><p>Le build s'effectue avec la commande <code>docker build -t mon-app:1.0 .</code> où le point final désigne le répertoire contextuel (contenant le Dockerfile et les fichiers à intégrer). Docker envoie ce contexte au daemon Docker qui exécute chaque instruction séquentiellement.</p><p>Dans un environnement professionnel, le Dockerfile est considéré comme du code source à part entière. Il doit être versionné dans Git, soumis à revue de code, et optimisé pour minimiser la taille des images et maximiser l'utilisation du cache.</p>`,
  wrongAnalysis:[
    {l:"A",t:"Docker Logs est une commande Docker (<code>docker logs &lt;conteneur&gt;</code>) qui affiche les journaux de sortie d'un conteneur en cours d'exécution ou stoppé. Les logs n'ont rien à voir avec la description du build d'une image — ils concernent l'exécution des conteneurs."},
    {l:"B",t:"'Docker Documents' n'est pas un terme ou concept Docker. Cela n'existe pas dans la documentation officielle Docker ni dans l'écosystème Docker. C'est un leurre générique."},
    {l:"D",t:"'Docker Stream' fait référence aux flux de données (streaming de logs, streaming d'output des commandes Docker) mais n'est pas une template de build d'image. Ce concept n'est pas un composant nommé de l'architecture Docker."}
  ],
  examiner:"Question directe sur la terminologie Docker. DockerFile (ou Dockerfile) est le terme canonique et officiel pour le fichier de description du build d'une image. Les distracteurs sont soit des commandes existantes détournées de leur contexte (Docker Logs), soit des termes inventés.",
  summary:["Le Dockerfile est le fichier template décrivant toutes les étapes du build d'une image Docker.","Chaque instruction crée une couche immuable dans l'image, mise en cache pour accélérer les builds futurs.","Il doit être versionné dans Git et traité comme du code source à part entière.","Le build se lance avec <code>docker build -t nom-image:tag .</code> depuis le répertoire contenant le Dockerfile."]
},
{
  num:"Q4", partie:"Partie 5",
  q:"Plusieurs conteneurs fonctionnant sur une seule machine partagent tous les mêmes ressources (CPU, RAM, etc…)",
  choices:{A:"Vrai",B:"Faux"},
  correct:"A",
  explanation:`<p>Cette affirmation est vraie. Plusieurs conteneurs fonctionnant sur une seule machine hôte partagent effectivement les ressources matérielles de cette machine : le CPU, la RAM, le stockage et la carte réseau. C'est l'une des caractéristiques fondamentales et des avantages majeurs de la conteneurisation par rapport à la virtualisation traditionnelle.</p><p>Pour bien comprendre ce mécanisme, il faut distinguer le partage des ressources matérielles du partage du noyau système. Les conteneurs partagent le <strong>noyau (kernel)</strong> du système d'exploitation hôte — contrairement aux machines virtuelles qui ont chacune leur propre noyau. Ce partage du noyau permet aux conteneurs d'accéder directement aux ressources matérielles via le planificateur (scheduler) du noyau, sans couche d'hyperviseur intermédiaire. Résultat : les performances sont proches du natif et le démarrage est quasi-instantané.</p><p>Le partage des ressources se fait via le mécanisme des <strong>cgroups (control groups)</strong> du noyau Linux. Docker utilise les cgroups pour allouer et limiter les ressources par conteneur. Par exemple : <code>docker run --memory=512m --cpus=1.5 mon-image</code> limite le conteneur à 512 Mo de RAM et 1,5 cœurs CPU maximum. Sans ces limites, les conteneurs partagent les ressources disponibles de façon dynamique selon leurs besoins.</p><p>L'explication du QCM original le résume bien : plusieurs conteneurs peuvent fonctionner sur la même machine et partager le noyau du système d'exploitation, chacun s'exécutant comme un processus isolé dans l'espace utilisateur. Les images de conteneurs font généralement quelques dizaines de Mo (versus plusieurs Go pour les VMs), peuvent gérer davantage d'applications et nécessitent moins de VMs et de systèmes d'exploitation.</p>`,
  wrongAnalysis:[
    {l:"B",t:"La proposition Faux est incorrecte. Les conteneurs sur une même machine hôte partagent bien le même pool de ressources matérielles (CPU, RAM, stockage, réseau). Répondre Faux suggérerait que chaque conteneur possède ses propres ressources matérielles dédiées, ce qui correspondrait à la description de machines virtuelles avec des ressources isolées, pas de conteneurs Docker."}
  ],
  examiner:"Cette question vrai/faux teste la compréhension du modèle de ressources de Docker par rapport aux VMs. Le partage du noyau et des ressources matérielles est LA distinction fondamentale entre conteneurs et VMs. C'est aussi ce qui explique la légèreté et les performances supérieures des conteneurs.",
  summary:["Les conteneurs sur une même machine partagent les ressources matérielles (CPU, RAM) via le planificateur du noyau.","Ils partagent aussi le noyau Linux de l'hôte — contrairement aux VMs qui ont chacune leur propre noyau.","Les cgroups Linux permettent à Docker de limiter les ressources par conteneur (<code>--memory</code>, <code>--cpus</code>).","Ce partage rend les conteneurs beaucoup plus légers (dizaines de Mo) et rapides à démarrer que les VMs (plusieurs Go)."]
},
{
  num:"Q5", partie:"Partie 5",
  q:"Quelle est l'adresse IP par défaut de l'hôte Docker ?",
  choices:{A:"10.10.10.10",B:"172.17.0.0/16",C:"0.0.0.0",D:"127.0.0.1"},
  correct:"B",
  explanation:`<p>L'adresse IP par défaut du réseau bridge Docker (et donc la plage d'adresses IP assignée par défaut aux conteneurs) est <code>172.17.0.0/16</code>. Cette plage est attribuée au réseau bridge par défaut créé automatiquement par Docker lors de son installation, accessible via l'interface réseau virtuelle <code>docker0</code> sur le système hôte.</p><p>Pour bien comprendre l'attribution des adresses, quand Docker démarre un conteneur sans réseau spécifié, il le connecte au réseau bridge par défaut (nommé <code>bridge</code>). La passerelle (gateway) de ce réseau est l'interface <code>docker0</code> sur l'hôte, qui reçoit l'adresse IP <code>172.17.0.1</code>. Les conteneurs reçoivent des adresses IP séquentielles dans la plage disponible : 172.17.0.2, 172.17.0.3, 172.17.0.4, et ainsi de suite jusqu'à 172.17.255.254.</p><p>La notation CIDR <code>/16</code> signifie que les 16 premiers bits sont fixes (correspondant à 172.17) et que les 16 bits restants peuvent varier. Cela offre théoriquement 65 534 adresses IP disponibles (2^16 - 2), ce qui est largement suffisant pour la grande majorité des déploiements Docker locaux ou de développement.</p><p>Dans un environnement professionnel, cette plage par défaut peut entrer en conflit avec des plages d'adresses IP existantes du réseau d'entreprise (si l'entreprise utilise déjà 172.17.x.x pour ses serveurs internes ou ses VPNs). Dans ce cas, on modifie la configuration du daemon Docker dans <code>/etc/docker/daemon.json</code> en ajoutant <code>"bip": "192.168.100.1/24"</code> pour changer la plage par défaut. Les réseaux Docker personnalisés créés avec <code>docker network create</code> utilisent d'autres plages.</p>`,
  wrongAnalysis:[
    {l:"A",t:"10.10.10.10 est une adresse IP arbitraire appartenant à la plage privée 10.0.0.0/8 (RFC 1918). Docker n'utilise pas cette adresse par défaut. C'est un leurre numérique sans signification particulière dans le contexte de la configuration réseau Docker."},
    {l:"C",t:"0.0.0.0 est une adresse spéciale qui signifie 'toutes les interfaces réseau disponibles'. Elle est utilisée dans des configurations de binding pour signifier 'écouter sur toutes les interfaces' (ex: <code>docker daemon --host tcp://0.0.0.0:2376</code>), mais ce n'est pas l'adresse du réseau bridge Docker par défaut."},
    {l:"D",t:"127.0.0.1 est l'adresse de loopback (localhost) qui permet à un processus de communiquer avec lui-même sur la même machine sans passer par la carte réseau physique. Ce n'est pas l'adresse du réseau bridge Docker. Elle reste accessible depuis les conteneurs pour atteindre leur propre interface loopback interne, mais pas pour rejoindre le réseau Docker."}
  ],
  examiner:"Question technique sur la configuration réseau par défaut de Docker. 172.17.0.0/16 est la valeur documentée dans la configuration officielle Docker et correspond à l'interface docker0. Les distracteurs utilisent des adresses IP spéciales bien connues (loopback, toutes-interfaces, adresse arbitraire) pour tester la précision des connaissances du candidat.",
  summary:["Le réseau bridge par défaut de Docker utilise la plage <code>172.17.0.0/16</code>.","L'interface <code>docker0</code> reçoit l'adresse <code>172.17.0.1</code> ; les conteneurs commencent à <code>172.17.0.2</code>.","Cette plage peut être modifiée dans <code>/etc/docker/daemon.json</code> en cas de conflit réseau.","0.0.0.0 = toutes les interfaces ; 127.0.0.1 = loopback — aucune des deux n'est l'adresse Docker par défaut."]
}
];

// ÉTAT
// ════════════════════════════════════════════════════════════════
let state = {
  current: 0,
  answers: new Array(QCM.length).fill(null),
  revealed: new Array(QCM.length).fill(false)
};

// ════════════════════════════════════════════════════════════════
// SIDEBAR
// ════════════════════════════════════════════════════════════════
function renderSidebar() {
  const parties = {};
  QCM.forEach((q,i) => {
    if (!parties[q.partie]) parties[q.partie] = [];
    parties[q.partie].push({q,i});
  });
  let html = '<div class="sb-title">Questions (' + QCM.length + ')</div>';
  for (const [p, items] of Object.entries(parties)) {
    html += `<div class="pg"><div class="pl">${p}</div>`;
    items.forEach(({q,i}) => {
      let cls = '';
      if (i === state.current) cls = ' active';
      else if (state.answers[i]) cls = state.answers[i] === q.correct ? ' correct' : ' wrong';
      const dot = state.answers[i] ? '<div class="qs"></div>' : '';
      html += `<div class="qi${cls}" onclick="goTo(${i})"><div class="qn">${i+1}</div><span>${q.num}</span>${dot}</div>`;
    });
    html += '</div>';
  }
  document.getElementById('sidebar').innerHTML = html;
}

// ════════════════════════════════════════════════════════════════
// PROGRESS
// ════════════════════════════════════════════════════════════════
function renderProgress() {
  const answered = state.answers.filter(Boolean).length;
  const correct = state.answers.filter((a,i) => a === QCM[i].correct).length;
  const pct = Math.round((answered / QCM.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = answered + ' / ' + QCM.length;
  document.getElementById('scoreDisplay').textContent = correct + ' / ' + answered;
}

// ════════════════════════════════════════════════════════════════
// MAIN RENDER
// ════════════════════════════════════════════════════════════════
function renderMain() {
  const q = QCM[state.current];
  const answered = state.answers[state.current];
  const revealed = state.revealed[state.current];

  let choicesHtml = '';
  Object.entries(q.choices).forEach(([k,v]) => {
    let cls = '', icon = '';
    if (answered) {
      if (k === q.correct) { cls = ' correct disabled'; icon = '<span class="ci">✓</span>'; }
      else if (k === answered) { cls = ' wrong disabled'; icon = '<span class="ci">✗</span>'; }
      else cls = ' ndis disabled';
    }
    choicesHtml += `<div class="choice${cls}" onclick="selectChoice('${k}')">
      <div class="cl">${k}</div>
      <div class="ct">${v}</div>
      ${icon}
    </div>`;
  });

  let expHtml = '';
  if (revealed) {
    const isCorrect = answered === q.correct;
    const wrongItemsHtml = (q.wrongAnalysis || []).map(w => `
      <div class="witem">
        <div class="wh"><div class="wl">${w.l}</div><div class="wlbl">Proposition ${w.l} — Pourquoi incorrecte</div></div>
        <div class="et">${w.t}</div>
      </div>`).join('');
    const summaryHtml = q.summary.map(s => `
      <div class="si-row"><div class="sa">→</div><div class="st">${s}</div></div>`).join('');

    expHtml = `<div class="explanation">
      <div class="ab${isCorrect ? '' : ' wa'}">
        <div class="ai">${isCorrect ? '✅' : '❌'}</div>
        <div>
          <div class="albl">${isCorrect ? 'Bonne réponse !' : 'Mauvaise réponse'}</div>
          <div class="ac">La bonne réponse est la <strong>Proposition ${q.correct}</strong> : ${q.choices[q.correct]}</div>
        </div>
      </div>
      <div class="eb">
        <div class="ebt blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>Explication détaillée</div>
        <div class="et">${q.explanation}</div>
      </div>
      ${wrongItemsHtml ? `<div class="eb"><div class="ebt red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>Analyse des propositions incorrectes</div><div class="wi">${wrongItemsHtml}</div></div>` : ''}
      <div class="eb">
        <div class="ebt purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>Ce que l'examinateur cherche à vérifier</div>
        <div class="et"><p>${q.examiner}</p></div>
      </div>
      <div class="eb">
        <div class="ebt yellow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Ce qu'il faut retenir</div>
        <div class="sl">${summaryHtml}</div>
      </div>
    </div>`;
  }

  const revealDisplay = answered && !revealed ? 'block' : 'none';

  document.getElementById('main').innerHTML = `
    <div class="q-header">
      <span class="pt-tag">${q.partie}</span>
      <span class="qn-tag">${q.num} · ${state.current+1} / ${QCM.length}</span>
    </div>
    <div class="qcard">
      <div class="qtext">${q.q}</div>
      <div class="choices">${choicesHtml}</div>
    </div>
    <div class="reveal-s" id="revealS" style="display:${revealDisplay}">
      <button class="reveal-btn" onclick="revealAnswer()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Voir l'explication complète du cours
      </button>
    </div>
    ${expHtml}
    <div class="nav">
      <button class="nb" onclick="goTo(${state.current-1})" ${state.current===0?'disabled':''}>← Précédent</button>
      ${state.current < QCM.length-1
        ? `<button class="nb primary" onclick="goTo(${state.current+1})">Suivant →</button>`
        : `<button class="nb primary" onclick="showResults()">Voir les résultats 🎉</button>`}
    </div>`;
  document.getElementById('main').scrollTop = 0;
}

// ════════════════════════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════════════════════════
function selectChoice(k) {
  if (state.answers[state.current]) return;
  state.answers[state.current] = k;
  renderAll();
}
function revealAnswer() {
  state.revealed[state.current] = true;
  renderAll();
}
function goTo(i) {
  if (i < 0 || i >= QCM.length) return;
  state.current = i;
  renderAll();
}
function renderAll() {
  renderSidebar();
  renderMain();
  renderProgress();
}

// ════════════════════════════════════════════════════════════════
// RÉSULTATS
// ════════════════════════════════════════════════════════════════
function showResults() {
  const correct = state.answers.filter((a,i) => a === QCM[i].correct).length;
  const answered = state.answers.filter(Boolean).length;
  const pct = Math.round((correct / QCM.length) * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
  const msg = pct >= 80 ? 'Excellent ! Vous maîtrisez les fondamentaux de Docker.' : pct >= 60 ? 'Bon résultat ! Quelques révisions suffiront pour consolider.' : 'Continuez à réviser avec les explications — vous progressez !';
  document.getElementById('main').innerHTML = `
    <div class="splash">
      <div class="splash-icon">${emoji}</div>
      <h1>Quiz terminé !</h1>
      <p>${msg}</p>
      <div class="splash-stats">
        <div class="sc"><div class="sn g">${correct}</div><div class="sl2">Bonnes réponses</div></div>
        <div class="sc"><div class="sn r">${answered-correct}</div><div class="sl2">Mauvaises réponses</div></div>
        <div class="sc"><div class="sn">${QCM.length-answered}</div><div class="sl2">Non répondues</div></div>
        <div class="sc"><div class="sn b">${pct}%</div><div class="sl2">Score final</div></div>
      </div>
      <button class="restart-btn" onclick="restart()">🔄 Recommencer le quiz</button>
    </div>`;
}
function restart() {
  state = { current:0, answers:new Array(QCM.length).fill(null), revealed:new Array(QCM.length).fill(false) };
  renderAll();
}

// EXPORT MODAL
// ════════════════════════════════════════════════════════════════
function showExportModal() { document.getElementById('exportModal').style.display='flex'; }
function closeModal() { document.getElementById('exportModal').style.display='none'; }

function buildExportContent() {
  let html = '';
  QCM.forEach((q, i) => {
    const choicesHtml = Object.entries(q.choices).map(([k,v]) =>
      `<div class="ec ${k===q.correct?'ecorrect':''}"><span class="ek">${k}</span> ${v}${k===q.correct?' ✓':''}</div>`
    ).join('');
    const wrongHtml = (q.wrongAnalysis||[]).map(w =>
      `<div class="ew"><strong>Proposition ${w.l} :</strong> ${w.t}</div>`
    ).join('');
    const summaryHtml = q.summary.map(s => `<li>${s}</li>`).join('');
    html += `<div class="eq">
      <div class="eq-header"><span class="eq-num">Question ${i+1}</span><span class="eq-tag">${q.partie} · ${q.num}</span></div>
      <div class="eq-q">${q.q}</div>
      <div class="eq-choices">${choicesHtml}</div>
      <div class="eq-section eq-answer"><strong>✅ Bonne réponse :</strong> Proposition ${q.correct} — ${q.choices[q.correct]}</div>
      <div class="eq-section">
        <div class="eq-section-title">📖 Explication détaillée</div>
        <div class="eq-text">${q.explanation}</div>
      </div>
      ${wrongHtml ? `<div class="eq-section"><div class="eq-section-title">❌ Analyse des propositions incorrectes</div>${wrongHtml}</div>` : ''}
      <div class="eq-section">
        <div class="eq-section-title">🎓 Ce que l'examinateur cherche à vérifier</div>
        <div class="eq-text"><p>${q.examiner}</p></div>
      </div>
      <div class="eq-section eq-summary">
        <div class="eq-section-title">⭐ Ce qu'il faut retenir</div>
        <ul>${summaryHtml}</ul>
      </div>
    </div>`;
  });
  return html;
}
