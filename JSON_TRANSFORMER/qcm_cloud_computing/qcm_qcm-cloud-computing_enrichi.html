        "explanation": "<p>La <strong>scalabilité</strong> (ou extensibilité) est l'un des piliers fondamentaux du Cloud Computing selon la définition du NIST. Elle désigne la capacité d'un système à gérer une charge de travail croissante en ajoutant des ressources (processeurs, mémoire, stockage, instances) de manière dynamique, sans interruption de service.</p><p>Dans un contexte d'architecture moderne, on distingue deux types principaux :</p><ul><li><strong>Scalabilité verticale (Scaling Up/Down) :</strong> Consiste à augmenter ou diminuer la puissance d'une instance existante (par exemple, passer d'une instance 2 vCPU à 8 vCPU). C'est souvent limité par le plafond technique du matériel.</li><li><strong>Scalabilité horizontale (Scaling Out/In) :</strong> Consiste à augmenter ou diminuer le nombre d'instances travaillant en parallèle derrière un équilibreur de charge (Load Balancer). C'est la méthode privilégiée dans le Cloud pour assurer une haute disponibilité.</li></ul><p><strong>Cas d'usage :</strong> Imaginez une plateforme e-commerce lors d'un 'Black Friday'. Le trafic explose en quelques minutes. La scalabilité permet de déployer automatiquement des serveurs supplémentaires pour absorber les requêtes, puis de les supprimer automatiquement après le pic pour éviter des coûts inutiles (c'est ce qu'on appelle l'Auto-Scaling).</p><p><strong>Bonnes pratiques :</strong> Pour qu'une application soit scalable, elle doit être <em>stateless</em> (sans état local). Les données de session doivent être stockées dans une base de données externe ou un cache (type Redis) plutôt que sur le disque dur du serveur, afin que n'importe quel serveur puisse traiter n'importe quelle requête.</p>",

        "explanation": "<p>Dans l'écosystème du Cloud Computing, le modèle <strong>SaaS (Software as a Service)</strong> représente le niveau d'abstraction le plus élevé pour l'utilisateur final. Contrairement au IaaS (Infrastructure as a Service) où vous gérez la virtualisation, le stockage et le réseau, ou au PaaS (Platform as a Service) où vous gérez l'application et les données, le SaaS vous livre une <strong>solution logicielle clé en main</strong>.</p><p>Dans le modèle SaaS, l'intégralité de la pile est gérée par le fournisseur cloud :</p><ul><li><strong>Infrastructure :</strong> Serveurs, réseau, datacenters.</li><li><strong>Plateforme :</strong> OS, middlewares, runtime.</li><li><strong>Application :</strong> Le logiciel lui-même, sa maintenance, ses mises à jour et sa sécurité.</li></ul><p>L'utilisateur se connecte via une interface standard (généralement un navigateur web) et consomme le service sous forme d'abonnement. <strong>Exemples concrets :</strong> Google Workspace, Salesforce, Microsoft 365, ou Slack. Ce modèle élimine le besoin d'installation locale, de gestion des patchs de sécurité système et de configuration du matériel.</p><p><strong>Bonnes pratiques DevOps/Cloud :</strong> En SaaS, la responsabilité du fournisseur est totale sur la disponibilité. Cependant, l'utilisateur garde la responsabilité de la <em>gestion des accès (IAM)</em>, du chiffrement des données utilisateur et de la configuration des politiques de sécurité applicatives (ex: activation du MFA). Une erreur classique est de penser que \"Cloud\" signifie \"sécurité totale\"; même en SaaS, la mauvaise gestion des droits d'accès reste la faille n°1.</p>",

        "correct": "B",

ntourner l'Internet public et stabiliser le temps de réponse.</p>",

p><strong>Erreurs courantes :</strong> Confondre l'utilisation d'une application SaaS avec la gestion d'une application hébergée en IaaS. En IaaS, vous êtes responsable de l'OS et des mises à jour applicatives, alors qu'en SaaS, votre seule responsabilité est la configuration de vos préférences et la gestion de vos identités utilisateur.</p>",

reur architecturale majeure.</p>",

      <div class="choices">${choicesHtml}</div>
    </div>
    <div class="reveal-s" id="revealS" style="display:${revealDisplay}">
      <button class="reveal-btn" onclick="revealAnswer()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Voir l'explication complète du cours
      </button>
    </div>
    ${expHtml}
    <div class="nav">
      <button class="nb" onclick="goTo(${state.current - 1})" ${state.current === 0 ? 'disabled' : ''}>← Précédent</button>
      ${state.current < QCM.length - 1
          ? `<button class="nb primary" onclick="goTo(${state.current + 1})">Suivant →</button>`
          : `<button class="nb primary" onclick="showResults()">Voir les résultats 🎉</button>`}
    </div>`;
      document.getElementById('main').scrollTop = 0;
    }

    // ════════════════════════════════════════════════════════════════
    // INTERACTIONS
    // ════════════════════════════════════════════════════════════════
    function selectChoice(k) {
      if (state.answers[state.current]) return;
      state.answers[state.current] = k;
      renderAll();
    }
    function revealAnswer() {
      state.revealed[state.current] = true;
      renderAll();
    }
    function goTo(i) {
      if (i < 0 || i >= QCM.length) return;
      state.current = i;
      renderAll();
    }
    function renderAll() {
      renderSidebar();
      renderMain();
      renderProgress();
    }

    // ════════════════════════════════════════════════════════════════
    // RÉSULTATS
    // ════════════════════════════════════════════════════════════════
    function showResults() {
      const correct = state.answers.filter((a, i) => a === QCM[i].correct).length;
      const answered = state.answers.filter(Boolean).length;
      const pct = Math.round((correct / QCM.length) * 100);
      const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
      const msg = pct >= 80 ? 'Excellent ! Vous maîtrisez les fondamentaux de Docker.' : pct >= 60 ? 'Bon résultat ! Quelques révisions suffiront pour consolider.' : 'Continuez à réviser avec les explications — vous progressez !';
      document.getElementById('main').innerHTML = `
    <div class="splash">
      <div class="splash-icon">${emoji}</div>
      <h1>Quiz terminé !</h1>
      <p>${msg}</p>
      <div class="splash-stats">
        <div class="sc"><div class="sn g">${correct}</div><div class="sl2">Bonnes réponses</div></div>
        <div class="sc"><div class="sn r">${answered - correct}</div><div class="sl2">Mauvaises réponses</div></div>
        <div class="sc"><div class="sn">${QCM.length - answered}</div><div class="sl2">Non répondues</div></div>
        <div class="sc"><div class="sn b">${pct}%</div><div class="sl2">Score final</div></div>
      </div>
      <button class="restart-btn" onclick="restart()">🔄 Recommencer le quiz</button>
    </div>`;
    }
    function restart() {
      state = { current: 0, answers: new Array(QCM.length).fill(null), revealed: new Array(QCM.length).fill(false) };
      renderAll();
    }

    // ════════════════════════════════════════════════════════════════
    // EXPORT MODAL
    // ════════════════════════════════════════════════════════════════
    function showExportModal() { document.getElementById('exportModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('exportModal').style.display = 'none'; }

    function buildExportContent() {
      let html = '';
      QCM.forEach((q, i) => {
        const choicesHtml = Object.entries(q.choices).map(([k, v]) =>
          `<div class="ec ${k === q.correct ? 'ecorrect' : ''}"><span class="ek">${k}</span> ${v}${k === q.correct ? ' ✓' : ''}</div>`
        ).join('');
        const wrongHtml = (q.wrongAnalysis || []).map(w =>
          `<div class="ew"><strong>Proposition ${w.l} :</strong> ${w.t}</div>`
        ).join('');
        const summaryHtml = q.summary.map(s => `<li>${s}</li>`).join('');
        html += `<div class="eq">
      <div class="eq-header"><span class="eq-num">Question ${i + 1}</span><span class="eq-tag">${q.partie} · ${q.num}</span></div>
      <div class="eq-q">${q.q}</div>
      <div class="eq-choices">${choicesHtml}</div>
      <div class="eq-section eq-answer"><strong>✅ Bonne réponse :</strong> Proposition ${q.correct} — ${q.choices[q.correct]}</div>
      <div class="eq-section">
        <div class="eq-section-title">📖 Explication détaillée</div>
        <div class="eq-text">${q.explanation}</div>
      </div>
      ${wrongHtml ? `<div class="eq-section"><div class="eq-section-title">❌ Analyse des propositions incorrectes</div>${wrongHtml}</div>` : ''}
      <div class="eq-section">
        <div class="eq-section-title">🎓 Ce que l'examinateur cherche à vérifier</div>
        <div class="eq-text"><p>${q.examiner}</p></div>
      </div>
      <div class="eq-section eq-summary">
        <div class="eq-section-title">⭐ Ce qu'il faut retenir</div>
        <ul>${summaryHtml}</ul>
      </div>
    </div>`;
      });
      return html;
    }
